# Nginx для бота + Mini App API
# Скопируй в /etc/nginx/sites-available/ и создай симлинк в sites-enabled
# sudo ln -s /etc/nginx/sites-available/avito-bot /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Замени YOUR_DOMAIN и путь к сертификатам (certbot создаёт их в /etc/letsencrypt/live/YOUR_DOMAIN/)

server {
    listen 80;
    server_name YOUR_DOMAIN;
    # Редирект на HTTPS (раскомментируй после настройки certbot)
    # return 301 https://$server_name$request_uri;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

